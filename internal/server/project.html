<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude Code Usage — Project Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --fn:'JetBrains Mono',ui-monospace,'SF Mono','Fira Code',monospace;
  --red:#ef4444;--red-bg:rgba(239,68,68,.05);
}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#222}
header{background:#1a1a2e;color:#eee;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:flex-start}
header>div:first-child{flex:1}
header h1{margin:0;font-size:1.4rem}
header p{margin:.25rem 0 0;font-size:.85rem;opacity:.7;max-width:800px;word-break:break-all}
header>a{color:#3b82f6;text-decoration:none;padding:.5rem 1rem;font-size:.85rem;white-space:nowrap;align-self:center}
header>a:hover{text-decoration:underline}
.toolbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:.75rem 2rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:.8rem;color:#555}
.toolbar input{border:1px solid #ccc;border-radius:4px;padding:.3rem .5rem;font-size:.8rem}
.toolbar button{background:#3b82f6;color:#fff;border:none;border-radius:4px;padding:.35rem .9rem;font-size:.8rem;cursor:pointer}
.toolbar button:hover{background:#2563eb}
main{max-width:1400px;margin:1.5rem auto;padding:0 1.5rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;margin-bottom:1.5rem}
.card{background:#fff;border-radius:8px;padding:1rem 1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.1);border-left:3px solid transparent}
.card .label{font-size:.7rem;text-transform:uppercase;color:#888;margin-bottom:.3rem;letter-spacing:.04em}
.card .value{font-size:1.6rem;font-weight:700;font-family:var(--fn)}
.card.warn{border-left-color:var(--red)}
.card.warn .value{color:var(--red)}
.card .note{font-size:.65rem;color:#aaa;margin-top:.2rem}
.chart-section{background:#fff;border-radius:8px;padding:1.25rem 1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:1.5rem}
.chart-section h2{margin:0 0 .75rem;font-size:.95rem;color:#555}
.chart-wrap{position:relative;height:260px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:768px){.grid2{grid-template-columns:1fr};header{flex-direction:column;gap:.5rem}header>a{align-self:flex-start}}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th,td{padding:.5rem .6rem;text-align:left;border-bottom:1px solid #eee}
th{background:#f9f9f9;font-weight:600;color:#555}
tr[onclick]:hover td{background:#f0f7ff;cursor:pointer}
.limit-row td{background:var(--red-bg)!important;box-shadow:inset 3px 0 0 var(--red)}
.limit-row:hover td{background:rgba(239,68,68,.08)!important}
.num{font-family:var(--fn)}
.est{color:#aaa;font-style:italic;font-family:var(--fn)}
.tag{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.65rem;font-weight:600;text-transform:uppercase;font-family:var(--fn)}
.tag.hard_limit{background:#fde8e8;color:#c0392b}
.tag.rate_limit{background:#fef3cd;color:#856404}
.tag.quota_limit{background:#fde8e8;color:#c0392b}
.tag.temporary_capacity{background:#e2e8f0;color:#475569}
.tag.unknown_limit{background:#f1f5f9;color:#64748b}
.bar-wrap{margin-top:3px;height:4px;background:#f0f0f0;border-radius:2px;min-width:40px}
.bar-fill{height:100%;border-radius:2px;transition:width .3s ease;background:rgba(59,130,246,.6)}
footer{text-align:center;padding:1.5rem;font-size:.7rem;color:#bbb}
</style>
</head>
<body>
<header>
  <div>
    <h1 id="projectName">Project Details</h1>
    <p id="projectPath">Loading…</p>
  </div>
  <a href="/">← Back to Dashboard</a>
</header>
<div class="toolbar">
  <div style="display:flex;gap:.5rem;flex-wrap:wrap">
    <button onclick="setPill('today')" style="background:#e5e7eb;color:#222;font-size:.75rem;padding:.25rem .6rem">Today</button>
    <button onclick="setPill('yesterday')" style="background:#e5e7eb;color:#222;font-size:.75rem;padding:.25rem .6rem">Yesterday</button>
    <button onclick="setPill('2days')" style="background:#e5e7eb;color:#222;font-size:.75rem;padding:.25rem .6rem">Last 2 days</button>
    <button onclick="setPill('5days')" style="background:#e5e7eb;color:#222;font-size:.75rem;padding:.25rem .6rem">Last 5 days</button>
    <button onclick="setPill('week')" style="background:#e5e7eb;color:#222;font-size:.75rem;padding:.25rem .6rem">Last week</button>
    <button onclick="setPill('2weeks')" style="background:#e5e7eb;color:#222;font-size:.75rem;padding:.25rem .6rem">Last 2 weeks</button>
    <button onclick="setPill('month')" style="background:#e5e7eb;color:#222;font-size:.75rem;padding:.25rem .6rem">Last month</button>
    <button onclick="setPill('thismonth')" style="background:#e5e7eb;color:#222;font-size:.75rem;padding:.25rem .6rem">This month</button>
  </div>
  <div style="display:flex;gap:.5rem;align-items:center;margin-top:.5rem">
    <label>From <input type="date" id="since"></label>
    <label>To <input type="date" id="until"></label>
    <button onclick="reload()">Apply</button>
    <button onclick="clearFilters()">Clear</button>
    <span id="status" style="font-size:.8rem;color:#888"></span>
  </div>
</div>
<main>
  <div class="cards" id="cards">
    <div class="card"><div class="label">Loading…</div><div class="value">—</div></div>
  </div>
  <div class="chart-section">
    <h2>Usage Over Time</h2>
    <div class="chart-wrap"><canvas id="chartUsage"></canvas></div>
  </div>
  <div class="grid2">
    <div class="chart-section">
      <h2>Limit Events Over Time</h2>
      <div class="chart-wrap"><canvas id="chartLimits"></canvas></div>
    </div>
    <div class="chart-section">
      <h2>Sessions Per Day</h2>
      <div class="chart-wrap"><canvas id="chartSessions"></canvas></div>
    </div>
  </div>
  <div class="chart-section">
    <h2>Sessions</h2>
    <table>
      <thead><tr><th>Started</th><th>Duration</th><th>User</th><th>Asst</th><th>Tools</th><th>Tokens</th><th>Limits</th><th>Cost</th></tr></thead>
      <tbody id="sessionsBody"></tbody>
    </table>
  </div>
  <div class="chart-section">
    <h2>Limit Events</h2>
    <table>
      <thead><tr><th>Timestamp</th><th>Classification</th><th>Pattern</th><th>Confidence</th><th>Excerpt</th></tr></thead>
      <tbody id="limitsBody"></tbody>
    </table>
  </div>
</main>
<footer>Claude Code Usage Analyser &nbsp;·&nbsp; All processing is local.</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
let chartUsage, chartLimits, chartSessions;

function qs(id){return document.getElementById(id)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDur(s){if(!s)return'—';const m=Math.floor(s/60),sec=s%60;return m>0?m+'m '+sec+'s':sec+'s'}
function fmtNum(n){return n?n.toLocaleString():'0'}
function fmtTok(s){
  if(s.known_total_tokens>0)return`<span class="num">${fmtNum(s.known_total_tokens)}</span>`;
  if(s.estimated_total_tokens>0)return`<span class="est">~${fmtNum(s.estimated_total_tokens)}</span>`;
  return '—';
}
function fmtCost(c){if(!c||c<0.0001)return'<span style="color:#ccc">—</span>';return'$'+c.toFixed(4);}

function getProjectID(){
  const p=new URLSearchParams(window.location.search);
  return p.get('id');
}

function dateParams(){
  const s=qs('since').value,u=qs('until').value;
  const p=new URLSearchParams;
  if(s)p.set('since',s);
  if(u)p.set('until',u);
  return p.toString()?'?'+p:'';
}

async function api(path){
  const r=await fetch(path+dateParams());
  return r.json();
}

function clearFilters(){qs('since').value='';qs('until').value='';reload()}

function setPill(range){
  const today=new Date();
  let since,until=today.toISOString().split('T')[0];
  switch(range){
    case'today':
      since=until;break;
    case'yesterday':
      const yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
      since=until=yesterday.toISOString().split('T')[0];break;
    case'2days':
      const d2=new Date(today);d2.setDate(d2.getDate()-1);
      since=d2.toISOString().split('T')[0];break;
    case'5days':
      const d5=new Date(today);d5.setDate(d5.getDate()-4);
      since=d5.toISOString().split('T')[0];break;
    case'week':
      const dw=new Date(today);dw.setDate(dw.getDate()-6);
      since=dw.toISOString().split('T')[0];break;
    case'2weeks':
      const d2w=new Date(today);d2w.setDate(d2w.getDate()-13);
      since=d2w.toISOString().split('T')[0];break;
    case'month':
      const dm=new Date(today);dm.setDate(dm.getDate()-29);
      since=dm.toISOString().split('T')[0];break;
    case'thismonth':
      since=new Date(today.getFullYear(),today.getMonth(),1).toISOString().split('T')[0];break;
  }
  qs('since').value=since;
  qs('until').value=until;
  reload();
}

async function reload(){
  const projID=getProjectID();
  if(!projID){
    qs('status').textContent='Error: no project ID';
    return;
  }
  qs('status').textContent='Loading…';
  try{
    const data=await api('/api/project/'+projID);
    if(!data||!data.project){
      qs('status').textContent='Error: project not found';
      return;
    }
    const proj=data.project;
    qs('projectName').textContent=proj.decoded_path||proj.encoded_path;
    qs('projectPath').textContent=(proj.decoded_path||proj.encoded_path);

    const daily=data.daily||[];
    const sessions=data.sessions||[];
    const limits=data.limit_events||[];
    const summary=data.summary||{};

    renderCards(summary);
    renderCharts(daily);
    renderSessions(sessions);
    renderLimits(limits);
    qs('status').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){
    qs('status').textContent='Error: '+e.message;
  }
}

function renderCards(s){
  qs('cards').innerHTML=[
    ['Sessions',fmtNum(s.session_count),''],
    ['User messages',fmtNum(s.user_messages),''],
    ['Assistant messages',fmtNum(s.assistant_messages),''],
    ['Tool calls',fmtNum(s.tool_calls),''],
    ['Known tokens',fmtNum(s.known_total_tokens),''],
    ['Est. tokens',fmtNum(s.estimated_total_tokens),'Estimated (chars/4)',''],
    ['Limit events',fmtNum(s.limit_events),'',s.limit_events>0?'warn':''],
  ].map(([l,v,n,cls])=>`<div class="card ${cls||''}"><div class="label">${l}</div><div class="value">${v}</div>${n?'<div class="note">'+n+'</div>':''}</div>`).join('');
}

function renderCharts(daily){
  const labels=daily.map(r=>r.date);
  function mk(id,type,datasets,opts={}){
    const canvas=qs(id);
    if(!canvas)return;
    const existing=Chart.getChart(canvas);
    if(existing)existing.destroy();
    const projID=getProjectID();
    const back=encodeURIComponent(window.location.href);
    const chartOpts={responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'top'},tooltip:{callbacks:{footer:()=>['Click to open day view']}}},scales:{y:{beginAtZero:true}},...opts,onClick:(evt,elements)=>{
      if(elements.length>0){
        const idx=elements[0].index;
        const date=labels[idx];
        window.location='/day?date='+date+(projID?'&project_id='+projID:'')+'&back='+back;
      }
    }};
    return new Chart(canvas,{type,data:{labels,datasets},options:chartOpts});
  }
  mk('chartUsage','line',[
    {label:'User messages',data:daily.map(r=>r.user_message_count),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',tension:.3,fill:true},
    {label:'Assistant messages',data:daily.map(r=>r.assistant_message_count),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.08)',tension:.3,fill:true},
    {label:'Tool calls',data:daily.map(r=>r.tool_call_count),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.08)',tension:.3,fill:true},
  ]);
  mk('chartLimits','bar',[{label:'Limit events',data:daily.map(r=>r.limit_event_count),backgroundColor:'rgba(220,38,38,.7)'}]);
  mk('chartSessions','bar',[{label:'Sessions',data:daily.map(r=>r.session_count),backgroundColor:'rgba(99,102,241,.7)'}]);
}

function renderSessions(sessions){
  const tb=qs('sessionsBody');
  if(!tb)return;
  const maxTok=Math.max(1,...sessions.map(s=>s.known_total_tokens||0));
  tb.innerHTML=(sessions||[]).map(s=>{
    const hasLim=s.limit_event_count>0;
    const pct=Math.round((s.known_total_tokens||0)/maxTok*100);
    return`<tr class="${hasLim?'limit-row':''}" style="cursor:pointer" onclick="window.location='/session?id=${s.id}&back='+encodeURIComponent(window.location.href)">
      <td class="num" style="font-size:.75rem">${s.started_at?s.started_at.slice(0,19).replace('T',' '):'—'}</td>
      <td class="num">${fmtDur(s.duration_seconds)}</td>
      <td class="num">${s.user_message_count}</td><td class="num">${s.assistant_message_count}</td>
      <td class="num">${s.tool_call_count}</td>
      <td>${s.known_total_tokens>0?`<span class="num">${fmtNum(s.known_total_tokens)}</span><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>`:fmtTok(s)}</td>
      <td>${hasLim?'<span class="tag hard_limit">'+s.limit_event_count+'</span>':'—'}</td>
      <td class="num" style="font-size:.75rem">${fmtCost(s.estimated_cost_usd)}</td>
    </tr>`;
  }).join('')||'<tr><td colspan="8" style="color:#aaa">No sessions.</td></tr>';
}

function renderLimits(limits){
  const tb=qs('limitsBody');
  if(!tb)return;
  const projBackUrl=encodeURIComponent(window.location.href);
  tb.innerHTML=(limits||[]).map(l=>`<tr class="limit-row" style="${l.session_id?'cursor:pointer':''}" ${l.session_id?`onclick="window.location='/session?sid=${encodeURIComponent(l.session_id)}&highlight=limit&back=${projBackUrl}'"`:''}>
    <td class="num" style="font-size:.75rem">${l.timestamp?l.timestamp.slice(0,19).replace('T',' '):'—'}</td>
    <td><span class="tag ${l.classification}">${l.classification}</span></td>
    <td>${esc(l.matched_pattern)}</td>
    <td class="num">${(l.confidence*100).toFixed(0)}%</td>
    <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(l.redacted_excerpt)}">${esc(l.redacted_excerpt)}</td>
  </tr>`).join('')||'<tr><td colspan="5" style="color:#aaa">No limit events detected.</td></tr>';
}

function init(){
  const p=new URLSearchParams(window.location.search);
  const since=p.get('since');
  const until=p.get('until');
  if(since)qs('since').value=since;
  if(until)qs('until').value=until;
  reload();
}
init();
</script>
</body>
</html>
