<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude Code Usage — Project Detail</title>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#222}
header{background:#1a1a2e;color:#eee;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:flex-start}
header>div:first-child{flex:1}
header h1{margin:0;font-size:1.4rem}
header p{margin:.25rem 0 0;font-size:.85rem;opacity:.7;max-width:800px;word-break:break-all}
header>a{color:#3b82f6;text-decoration:none;padding:.5rem 1rem;font-size:.85rem;white-space:nowrap;align-self:center}
header>a:hover{text-decoration:underline}
.toolbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:.75rem 2rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:.8rem;color:#555}
.toolbar input{border:1px solid #ccc;border-radius:4px;padding:.3rem .5rem;font-size:.8rem}
.toolbar button{background:#3b82f6;color:#fff;border:none;border-radius:4px;padding:.35rem .9rem;font-size:.8rem;cursor:pointer}
.toolbar button:hover{background:#2563eb}
main{max-width:1400px;margin:1.5rem auto;padding:0 1.5rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;margin-bottom:1.5rem}
.card{background:#fff;border-radius:8px;padding:1rem 1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card .label{font-size:.7rem;text-transform:uppercase;color:#888;margin-bottom:.3rem}
.card .value{font-size:1.6rem;font-weight:700}
.card.warn .value{color:#c0392b}
.card .note{font-size:.65rem;color:#aaa;margin-top:.2rem}
.chart-section{background:#fff;border-radius:8px;padding:1.25rem 1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:1.5rem}
.chart-section h2{margin:0 0 .75rem;font-size:.95rem;color:#555}
.chart-wrap{position:relative;height:260px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:768px){.grid2{grid-template-columns:1fr};header{flex-direction:column;gap:.5rem}header>a{align-self:flex-start}}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th,td{padding:.5rem .6rem;text-align:left;border-bottom:1px solid #eee}
th{background:#f9f9f9;font-weight:600;color:#555}
.tag{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.65rem;font-weight:600;text-transform:uppercase}
.tag.hard_limit{background:#fde8e8;color:#c0392b}
.tag.rate_limit{background:#fef3cd;color:#856404}
.tag.quota_limit{background:#fde8e8;color:#c0392b}
.tag.temporary_capacity{background:#e2e8f0;color:#475569}
.tag.unknown_limit{background:#f1f5f9;color:#64748b}
.est{color:#aaa;font-style:italic}
footer{text-align:center;padding:1.5rem;font-size:.7rem;color:#bbb}
</style>
</head>
<body>
<header>
  <div>
    <h1 id="projectName">Project Details</h1>
    <p id="projectPath">Loading…</p>
  </div>
  <a href="/">← Back to Dashboard</a>
</header>
<div class="toolbar">
  <span id="status" style="font-size:.8rem;color:#888">Loading…</span>
</div>
<main>
  <div class="cards" id="cards">
    <div class="card"><div class="label">Loading…</div><div class="value">—</div></div>
  </div>
  <div class="chart-section">
    <h2>Usage Over Time</h2>
    <div class="chart-wrap"><canvas id="chartUsage"></canvas></div>
  </div>
  <div class="grid2">
    <div class="chart-section">
      <h2>Limit Events Over Time</h2>
      <div class="chart-wrap"><canvas id="chartLimits"></canvas></div>
    </div>
    <div class="chart-section">
      <h2>Sessions Per Day</h2>
      <div class="chart-wrap"><canvas id="chartSessions"></canvas></div>
    </div>
  </div>
  <div class="chart-section">
    <h2>Sessions</h2>
    <table>
      <thead><tr><th>Started</th><th>Duration</th><th>User</th><th>Asst</th><th>Tools</th><th>Tokens</th><th>Limits</th></tr></thead>
      <tbody id="sessionsBody"></tbody>
    </table>
  </div>
  <div class="chart-section">
    <h2>Limit Events</h2>
    <table>
      <thead><tr><th>Timestamp</th><th>Classification</th><th>Pattern</th><th>Confidence</th><th>Excerpt</th></tr></thead>
      <tbody id="limitsBody"></tbody>
    </table>
  </div>
</main>
<footer>Claude Code Usage Analyser &nbsp;·&nbsp; All processing is local.</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
let chartUsage, chartLimits, chartSessions;

function qs(id){return document.getElementById(id)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDur(s){if(!s)return'—';const m=Math.floor(s/60),sec=s%60;return m>0?m+'m '+sec+'s':sec+'s'}
function fmtNum(n){return n?n.toLocaleString():'0'}
function fmtTok(s){
  if(s.known_total_tokens>0)return fmtNum(s.known_total_tokens);
  if(s.estimated_total_tokens>0)return '<span class="est">~'+fmtNum(s.estimated_total_tokens)+'</span>';
  return '—';
}

function getProjectID(){
  const p=new URLSearchParams(window.location.search);
  return p.get('id');
}

async function api(path){
  const r=await fetch(path);
  return r.json();
}

async function reload(){
  const projID=getProjectID();
  if(!projID){
    qs('status').textContent='Error: no project ID';
    return;
  }
  qs('status').textContent='Loading…';
  try{
    const data=await api('/api/project/'+projID);
    if(!data||!data.project){
      qs('status').textContent='Error: project not found';
      return;
    }
    const proj=data.project;
    qs('projectName').textContent=proj.decoded_path||proj.encoded_path;
    qs('projectPath').textContent=(proj.decoded_path||proj.encoded_path);

    const daily=data.daily||[];
    const sessions=data.sessions||[];
    const limits=data.limit_events||[];
    const summary=data.summary||{};

    renderCards(summary);
    renderCharts(daily);
    renderSessions(sessions);
    renderLimits(limits);
    qs('status').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){
    qs('status').textContent='Error: '+e.message;
  }
}

function renderCards(s){
  qs('cards').innerHTML=[
    ['Sessions',fmtNum(s.session_count),''],
    ['User messages',fmtNum(s.user_messages),''],
    ['Assistant messages',fmtNum(s.assistant_messages),''],
    ['Tool calls',fmtNum(s.tool_calls),''],
    ['Known tokens',fmtNum(s.known_total_tokens),''],
    ['Est. tokens','<span class="est">'+fmtNum(s.estimated_total_tokens)+'</span>','Estimated (chars/4)',''],
    ['Limit events',fmtNum(s.limit_events),'',s.limit_events>0?'warn':''],
  ].map(([l,v,n,cls])=>`<div class="card ${cls||''}"><div class="label">${l}</div><div class="value">${v}</div>${n?'<div class="note">'+n+'</div>':''}</div>`).join('');
}

function renderCharts(daily){
  const labels=daily.map(r=>r.date);
  function mk(id,type,datasets,opts={}){
    const canvas=qs(id);
    if(!canvas)return;
    const existing=Chart.getChart(canvas);
    if(existing)existing.destroy();
    return new Chart(canvas,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}},...opts}});
  }
  mk('chartUsage','line',[
    {label:'User messages',data:daily.map(r=>r.user_message_count),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',tension:.3,fill:true},
    {label:'Assistant messages',data:daily.map(r=>r.assistant_message_count),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.08)',tension:.3,fill:true},
    {label:'Tool calls',data:daily.map(r=>r.tool_call_count),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.08)',tension:.3,fill:true},
  ]);
  mk('chartLimits','bar',[{label:'Limit events',data:daily.map(r=>r.limit_event_count),backgroundColor:'rgba(220,38,38,.7)'}]);
  mk('chartSessions','bar',[{label:'Sessions',data:daily.map(r=>r.session_count),backgroundColor:'rgba(99,102,241,.7)'}]);
}

function renderSessions(sessions){
  const tb=qs('sessionsBody');
  if(!tb)return;
  tb.innerHTML=(sessions||[]).map(s=>`<tr>
    <td>${s.started_at?s.started_at.slice(0,19).replace('T',' '):'—'}</td>
    <td>${fmtDur(s.duration_seconds)}</td>
    <td>${s.user_message_count}</td><td>${s.assistant_message_count}</td>
    <td>${s.tool_call_count}</td><td>${fmtTok(s)}</td>
    <td>${s.limit_event_count>0?'<span class="tag hard_limit">'+s.limit_event_count+'</span>':'—'}</td>
  </tr>`).join('')||'<tr><td colspan="7" style="color:#aaa">No sessions.</td></tr>';
}

function renderLimits(limits){
  const tb=qs('limitsBody');
  if(!tb)return;
  tb.innerHTML=(limits||[]).map(l=>`<tr>
    <td>${l.timestamp?l.timestamp.slice(0,19).replace('T',' '):'—'}</td>
    <td><span class="tag ${l.classification}">${l.classification}</span></td>
    <td>${esc(l.matched_pattern)}</td>
    <td>${(l.confidence*100).toFixed(0)}%</td>
    <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(l.redacted_excerpt)}">${esc(l.redacted_excerpt)}</td>
  </tr>`).join('')||'<tr><td colspan="5" style="color:#aaa">No limit events detected.</td></tr>';
}

reload();
</script>
</body>
</html>
